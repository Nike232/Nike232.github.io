<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index,follow">
  <title>Notes | Tomfng</title>
  <link rel="icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/note-console.css">
</head>
<body class="note-console">
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>Tomfng Notes</span>
    </a>
    <nav aria-label="Primary">
      <a href="/">Home</a>
      <a href="/notes/" aria-current="page">Notes</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>

  <main class="reader-layout">
    <aside class="reader-rail" aria-label="Notes index">
      <div class="rail-head">
        <h1>Notes</h1>
        <span class="count-pill" id="note-count">0</span>
      </div>
      <label class="search-block">
        <span>Search</span>
        <input id="search-input" type="search" autocomplete="off" placeholder="标题、标签、正文">
      </label>
      <div class="tag-strip" id="tag-strip" aria-label="Tags"></div>
      <div class="note-list" id="note-list" aria-live="polite">
        <div class="skeleton" aria-label="Loading">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </aside>

    <article class="note-view" id="note-view" aria-live="polite">
      <div class="loading-state">
        <div class="skeleton">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </article>
  </main>

  <script type="module" src="/notes/notes.js"></script>
</body>
</html>
