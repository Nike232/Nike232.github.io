name: Build and publish Hexo

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hexo-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish generated site to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          mkdir -p ../site-artifact
          cp -a public/. ../site-artifact/
          git worktree add ../pages-main origin/main
          find ../pages-main -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a ../site-artifact/. ../pages-main/
          cd ../pages-main
          touch .nojekyll
          git add -A
          git commit -m "Deploy site from ${GITHUB_SHA}" || exit 0
          git push origin HEAD:main
